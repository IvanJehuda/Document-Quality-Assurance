# Layer-1 comparison cases: operation=yoy_growth.
# Prior-year same-month point is fetched automatically by the engine, so the fact lists
# only the current point. Real M2: Apr-2026 = 10.253.651,888 | Apr-2025 = 9.387.895,1895 (miliar Rp)
# → true yoy = 9,2221%.

- id: yoy_m2_apr_entailed
  description: "M2 yoy growth Apr-2026 (real ≈ 9,2%) stated correctly"
  table:
    title: "Uang Beredar dan faktor-faktor yang mempengaruhinya"
    unit: "Miliar Rp"
    data:
      - {label: "Uang Beredar Luas(M2)", year: 2026, month: Apr, value: 10253651.888}
      - {label: "Uang Beredar Luas(M2)", year: 2025, month: Apr, value: 9387895.1895}
  fact:
    operation: yoy_growth
    unit: "persen_yoy"
    claimed_value: 9.2
    context_quote: "M2 tumbuh 9,2% (yoy) pada April 2026"
    periods:
      - {metric_label: "Uang Beredar Luas(M2)", year: 2026, month: Apr}
  expected:
    verdict: Entailed
    computed_value: 9.2221

- id: yoy_m2_apr_refuted
  description: "Overstated yoy growth (10,8% vs real 9,2%)"
  table:
    title: "Uang Beredar dan faktor-faktor yang mempengaruhinya"
    unit: "Miliar Rp"
    data:
      - {label: "Uang Beredar Luas(M2)", year: 2026, month: Apr, value: 10253651.888}
      - {label: "Uang Beredar Luas(M2)", year: 2025, month: Apr, value: 9387895.1895}
  fact:
    operation: yoy_growth
    unit: "persen_yoy"
    claimed_value: 10.8
    context_quote: "M2 tumbuh 10,8% (yoy)"
    periods:
      - {metric_label: "Uang Beredar Luas(M2)", year: 2026, month: Apr}
  expected:
    verdict: Refuted
    computed_value: 9.2221

- id: yoy_simpanan_berjangka_not_shadowed_by_generic_simpanan_row
  description: >
    Regression guard for the label-matching tier order: BI I.1 has BOTH 'Simpanan Berjangka
    (Rupiah dan Valas)' (Uang Kuasi component, the right row) and a nested determinants row
    labelled just 'Simpanan' (negative liability). A claim about "simpanan berjangka" must bind
    to the fuller label, not the short generic one — the old single-pool shortest-wins rule
    picked 'Simpanan' and returned a false Refuted (-16,27% vs the correct 4,6%). Real values.
  table:
    title: "Uang Beredar dan faktor-faktor yang mempengaruhinya"
    unit: "Miliar Rp"
    data:
      - {label: "Simpanan Berjangka (Rupiah dan Valas)", year: 2026, month: Apr, value: 3158896.8825}
      - {label: "Simpanan Berjangka (Rupiah dan Valas)", year: 2025, month: Apr, value: 3019897.8733}
      - {label: "Simpanan", year: 2026, month: Apr, value: -560955.7467}
      - {label: "Simpanan", year: 2025, month: Apr, value: -482476.0102}
  fact:
    operation: yoy_growth
    unit: "persen_yoy"
    claimed_value: 4.6
    context_quote: "simpanan berjangka dan tabungan lainnya masing-masing tumbuh sebesar 4,6% (yoy)"
    periods:
      - {metric_label: "simpanan berjangka", year: 2026, month: Apr}
  expected:
    verdict: Entailed
    computed_value: 4.6028

- id: yoy_qualified_subrow_not_shadowed_by_other_sections_duplicate
  description: >
    Regression guard for duplicate-label shadowing: BI I.1 repeats sub-row labels like
    'Rupiah' under both Simpanan Berjangka and Tabungan Lainnya. The parser used to keep only
    the FIRST section's values (first-occurrence-wins), so a claim about "tabungan lainnya
    rupiah" silently read Simpanan Berjangka's Rupiah (yoy 2,70%) instead of its own (7,08%).
    Rows now arrive parent-qualified ('Parent > Rupiah') and the leaf matching tier must pick
    the section whose parent words appear in the query. Real values from TABEL1_1.xls I.1.
  table:
    title: "Uang Beredar dan faktor-faktor yang mempengaruhinya"
    unit: "Miliar Rp"
    data:
      - {label: "Simpanan Berjangka (Rupiah dan Valas) > Rupiah", year: 2026, month: Apr, value: 2748250.167}
      - {label: "Simpanan Berjangka (Rupiah dan Valas) > Rupiah", year: 2025, month: Apr, value: 2676099.9896}
      - {label: "Tabungan Lainnya (Rupiah dan Valas) > Rupiah", year: 2026, month: Apr, value: 2696896.651}
      - {label: "Tabungan Lainnya (Rupiah dan Valas) > Rupiah", year: 2025, month: Apr, value: 2518681.1564}
  fact:
    operation: yoy_growth
    unit: "persen_yoy"
    claimed_value: 7.1
    context_quote: "tabungan lainnya rupiah tumbuh sebesar 7,1% (yoy)"
    periods:
      - {metric_label: "tabungan lainnya rupiah", year: 2026, month: Apr}
  expected:
    verdict: Entailed
    computed_value: 7.0757

